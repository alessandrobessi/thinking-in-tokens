<svg viewBox="0 0 200 200" width="100%" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#FBF9F6"/>
  <!-- Canonical compression icon: wide block squeezed into a narrow block, shrink arrow between. -->
  <g id="icon-compression-squeeze">
    <rect x="10" y="80" width="70" height="40" rx="8" fill="#3D5A80" stroke="#1B1B2F" stroke-width="2"/>
    <path d="M 90 100 L 120 100" stroke="#EE964B" stroke-width="2" marker-end="url(#icon-compression-arrowhead)"/>
    <rect x="130" y="90" width="30" height="20" rx="8" fill="#3D5A80" stroke="#1B1B2F" stroke-width="2"/>
    <defs>
      <marker id="icon-compression-arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
        <path d="M0,0 L8,4 L0,8 Z" fill="#EE964B"/>
      </marker>
    </defs>
  </g>
</svg>
