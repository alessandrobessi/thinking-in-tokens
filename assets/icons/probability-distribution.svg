<svg viewBox="0 0 200 200" width="100%" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#FBF9F6"/>
  <!-- Canonical probability icon: low hump (unlikely) to high hump (likely) distribution curve. -->
  <g id="icon-probability-distribution">
    <line x1="20" y1="160" x2="180" y2="160" stroke="#1B1B2F" stroke-width="1"/>
    <path d="M 20 155 Q 60 145 90 150 T 180 60" fill="none" stroke="#98A6B3" stroke-width="2"/>
    <circle cx="180" cy="60" r="6" fill="#EE964B"/>
  </g>
</svg>
