# Machine-readable source of truth for the concept dependency graph in
# blueprint.md. concept-graph.md is this file's human-readable mirror —
# update both together (or regenerate the .md from this file by hand until
# a real generator script exists; see ROADMAP.md).
#
# Fields:
#   id                 stable slug, referenced by nothing else yet but
#                      intended for future cross-linking (diagrams, issues)
#   name               display name, matches blueprint.md's concept graph
#   level              0-8, per blueprint.md's Concept Dependency Graph
#   prerequisites      concept ids that must be introduced first. Encodes
#                      the *tightest* real dependency, not "everything in
#                      every earlier level" — transitive prerequisites are
#                      implied through the chain, not repeated here.
#   introduced_in      chapter number (new 30-chapter numbering) where this
#                      concept is first formally taught
#   written            true if that chapter's prose currently exists
#   misconception_ids  keys into misconceptions.md's ID column
#   diagram            where the concept's canonical/reference visual lives

